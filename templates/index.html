<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PDF to Speech | AI Voice Generator</title>

<!-- AdSense Top Banner -->
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-3876451779508554"
     crossorigin="anonymous"></script>
<ins class="adsbygoogle"
     style="display:block"
     data-ad-format="auto"
     data-full-width-responsive="true"></ins>
<script>
     (adsbygoogle = window.adsbygoogle || []).push({});
</script>

<style>
body { margin:0; font-family:'Segoe UI', sans-serif; background:linear-gradient(135deg,#0f2027,#203a43,#2c5364); color:white; }
.container { max-width:420px; margin:40px auto; padding:25px; background:rgba(255,255,255,0.05); border-radius:20px; backdrop-filter:blur(15px); box-shadow:0 0 30px rgba(0,0,0,0.5); text-align:center; }
h1{ font-size:26px; margin-bottom:20px; }
select, textarea, input{ width:100%; padding:12px; margin:10px 0; border-radius:10px; border:none; outline:none; }
button{ width:100%; padding:14px; border:none; border-radius:10px; background:linear-gradient(45deg,#00c6ff,#0072ff); color:white; font-weight:bold; cursor:pointer; transition:0.3s; }
button:hover{ transform:scale(1.05); }
.loader{ display:none; margin-top:15px; }
.loader div{ width:10px; height:10px; background:white; margin:3px; display:inline-block; border-radius:50%; animation:bounce 1.2s infinite; }
.loader div:nth-child(2){ animation-delay:0.2s; }
.loader div:nth-child(3){ animation-delay:0.4s; }
@keyframes bounce{ 0%,80%,100%{ transform:scale(0);} 40%{ transform:scale(1);} }
.features{ margin-top:25px; text-align:left; }
.features div{ margin:5px 0; }
.footer{ margin-top:20px; font-size:13px; }
a{ color:#00c6ff; text-decoration:none; margin:0 5px; }
</style>

<script>
function showLoader(){ document.getElementById("loader").style.display="block"; }
</script>

</head>
<body>

<div class="container">

<h1>🎧 AI PDF → Speech</h1>

<form action="/convert" method="post" enctype="multipart/form-data" onsubmit="showLoader()">
<select name="mode">
<option value="pdf">📄 PDF → Speech</option>
<option value="text">✍️ Text → Speech</option>
</select>

<input type="file" name="pdf">
<textarea name="text" placeholder="Paste your text here..."></textarea>

<select name="voice">
<option value="female_india">🇮🇳 Female Voice</option>
<option value="male_india">🇮🇳 Male Voice</option>
<option value="female_us">🇺🇸 Female Voice</option>
<option value="male_uk">🇬🇧 Male Voice</option>
</select>

<select name="speed">
<option value="1">Normal Speed</option>
<option value="0.8">Slow</option>
<option value="1.2">Fast</option>
<option value="1.5">Very Fast</option>
</select>

<button type="submit">⚡ Generate Audio</button>

<div id="loader" class="loader"><div></div><div></div><div></div><p>Generating AI Voice...</p></div>
</form>

<div class="features">
<div>⚡ Fast Conversion</div>
<div>🎧 Real AI Voices</div>
<div>📱 Mobile Friendly</div>
<div>🔒 Safe & Secure</div>
</div>

<div class="footer">
<a href="/about">About</a> |
<a href="/privacy">Privacy</a> |
<a href="/terms">Terms</a> |
<a href="/contact">Contact</a>
</div>

</div>

</body>
</html>
