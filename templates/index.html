<!DOCTYPE html>
<html>
<head>
    <title>AI Speech Tool</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            font-family: Arial;
            background: linear-gradient(135deg, #141e30, #243b55);
            color: white;
            text-align: center;
            padding: 20px;
        }

        h1 {
            font-size: 28px;
        }

        .box {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            padding: 25px;
            border-radius: 20px;
            max-width: 420px;
            margin: auto;
            box-shadow: 0 0 20px rgba(0,0,0,0.4);
        }

        input, textarea, select, button {
            width: 95%;
            margin: 10px;
            padding: 12px;
            border-radius: 12px;
            border: none;
            font-size: 14px;
        }

        textarea {
            height: 100px;
        }

        button {
            background: linear-gradient(45deg, #ff9800, #ff5722);
            color: white;
            font-size: 16px;
            cursor: pointer;
        }

        button:hover {
            opacity: 0.9;
        }

        .ad-box {
            margin-top: 20px;
            padding: 15px;
            background: rgba(255,255,255,0.08);
            border-radius: 10px;
        }

        .loading {
            display: none;
            margin-top: 15px;
            font-size: 14px;
            color: #ffcc00;
        }
    </style>

    <script>
        function showLoading() {
            document.getElementById("loading").style.display = "block";
        }
    </script>

</head>

<body>

<h1>🔥 AI PDF / Text to Speech</h1>

<div class="box">

<form action="/convert" method="post" enctype="multipart/form-data" onsubmit="showLoading()">

    <select name="mode">
        <option value="pdf">📄 PDF → Speech</option>
        <option value="text">✍️ Text → Speech</option>
    </select>

    <input type="file" name="pdf" accept=".pdf">

    <textarea name="text" placeholder="Paste or type text here..."></textarea>

    <h3>🎙️ Select Voice</h3>
    <select name="voice">
        <option value="female_india">🇮🇳 Female (India)</option>
        <option value="male_india">🇮🇳 Male (India)</option>
        <option value="female_us">🇺🇸 Female (US)</option>
        <option value="male_uk">🇬🇧 Male (UK)</option>
    </select>

    <button type="submit">Convert 🚀</button>

</form>

<div id="loading" class="loading">
    ⏳ Converting... please wait
</div>

<!-- 💰 Ad Space -->
<div class="ad-box">
    <p>Ad Space (Add Google AdSense later)</p>
</div>

</div>

</body>
</html>
