<!DOCTYPE html>
<html>
<head>
    <title>AI Speech Tool</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            font-family: Arial;
            background: linear-gradient(135deg, #1d2671, #c33764);
            color: white;
            text-align: center;
            padding: 20px;
        }

        .box {
            background: rgba(255,255,255,0.1);
            padding: 20px;
            border-radius: 15px;
            max-width: 400px;
            margin: auto;
        }

        input, textarea, select, button {
            width: 90%;
            margin: 10px;
            padding: 10px;
            border-radius: 10px;
            border: none;
        }

        button {
            background: #ff9800;
            color: white;
            font-size: 16px;
        }
    </style>
</head>

<body>

<h1>🔥 AI Speech Tool</h1>

<div class="box">
<form action="/convert" method="post" enctype="multipart/form-data">

    <select name="mode">
        <option value="pdf">📄 PDF → Speech</option>
        <option value="text">✍️ Text → Speech</option>
        <option value="image">🖼️ Image → Speech</option>
    </select>

    <input type="file" name="pdf" accept=".pdf">
    <input type="file" name="image" accept="image/*">

    <textarea name="text" placeholder="Type text here..."></textarea>

    <h3>🎙️ Voice Style</h3>
    <select name="voice">
        <option value="normal">🎙️ Normal</option>
        <option value="calm">😌 Calm / Relax</option>
        <option value="fast">⚡ Fast / Energetic</option>
    </select>

    <button type="submit">Convert 🚀</button>

</form>
</div>

</body>
</html>
