<!DOCTYPE html>
<html>
<head>
    <title>Result</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            background: #000;
            color: white;
            text-align: center;
            padding: 20px;
            font-family: Arial;
        }

        .card {
            background: rgba(255,255,255,0.1);
            padding: 20px;
            border-radius: 15px;
        }

        a {
            color: orange;
            text-decoration: none;
            font-size: 18px;
        }
    </style>
</head>

<body>

<h1>🎧 Your Audio is Ready</h1>

<div class="card">

<audio id="audio" controls autoplay style="width:95%;">
    <source src="{{ audio_file }}" type="audio/mpeg">
</audio>

<br><br>

<label>Playback Speed</label><br>
<input type="range" min="0.5" max="2" step="0.1" value="1"
       oninput="document.getElementById('audio').playbackRate = this.value">

<br><br>

<a href="{{ audio_file }}" download>⬇ Download Audio</a>

</div>

<br><br>

<!-- 💰 AD SPACE -->
<div class="card">
    <p>Ad Space (AdSense)</p>
</div>

<br>

<a href="/">⬅ Back</a>

</body>
</html>
