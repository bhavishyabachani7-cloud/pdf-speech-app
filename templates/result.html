<!DOCTYPE html>
<html>
<head>
    <title>Result</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body style="text-align:center; background:black; color:white; padding:20px;">

<h1>🎧 Your Audio is Ready</h1>

<audio id="audio" controls autoplay style="width:90%;">
    <source src="{{ audio_file }}" type="audio/mpeg">
</audio>

<br><br>

<label>Playback Speed</label><br>
<input type="range" min="0.5" max="2" step="0.1" value="1"
       oninput="document.getElementById('audio').playbackRate = this.value">

<br><br>

<a href="{{ audio_file }}" download style="color:orange; font-size:18px;">
⬇ Download Audio
</a>

<br><br>

<a href="/" style="color:white;">⬅ Back</a>

</body>
</html>
